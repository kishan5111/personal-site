  <title id="title">Wanting rises while liking declines over time</title>
  <desc id="desc">A simple chart inspired by incentive sensitization diagrams, with a red wanting band rising over time and a blue liking curve declining below baseline.</desc>

  <rect width="920" height="620" fill="#FFFDF8"/>

  <rect x="120" y="54" width="700" height="462" fill="#F7EBD6"/>

  <g stroke="#FFF9F0" stroke-width="2">
