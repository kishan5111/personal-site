  <path d="M170 396C226 396 279 389 327 375C374 361 416 339 451 310C486 282 514 248 534 210C555 171 584 146 620 136C658 126 701 119 750 109" stroke="#E3264A" stroke-width="7" stroke-linecap="round"/>

