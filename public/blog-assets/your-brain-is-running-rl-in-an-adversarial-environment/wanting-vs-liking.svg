  <line x1="120" y1="434" x2="138" y2="434" stroke="#1F1A17" stroke-width="4"/>
  <line x1="120" y1="282" x2="138" y2="282" stroke="#1F1A17" stroke-width="4"/>
  <line x1="120" y1="130" x2="138" y2="130" stroke="#1F1A17" stroke-width="4"/>

  <line x1="170" y1="398" x2="620" y2="398" stroke="#1F1A17" stroke-width="6"/>

