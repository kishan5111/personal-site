<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 35px 'Manrope', ui-sans-serif, system-ui; fill: #17120F; }
      .label { font: 700 22px 'Manrope', ui-sans-serif, system-ui; fill: #17120F; }
      .body { font: 500 17px 'Manrope', ui-sans-serif, system-ui; fill: #4B4037; }
      .small { font: 600 13px 'Manrope', ui-sans-serif, system-ui; fill: #6D6259; letter-spacing: .12em; text-transform: uppercase; }
      .mono { font: 700 16px 'IBM Plex Mono', ui-monospace, monospace; fill: #17120F; }
    </style>
  </defs>

  <rect width="1440" height="860" rx="28" fill="#F7F1E3"/>
  <text x="86" y="96" class="small">Serving scheduler</text>
  <text x="86" y="148" class="title">Static batching leaves idle slots.</text>
  <text x="86" y="188" class="title">Continuous batching refills them.</text>

  <rect x="86" y="220" width="596" height="556" rx="28" fill="#FCF7ED" stroke="#D7C6AC" stroke-width="2"/>
  <rect x="758" y="220" width="596" height="556" rx="28" fill="#FCF7ED" stroke="#D7C6AC" stroke-width="2"/>

  <text x="120" y="268" class="label">Static batching</text>
  <text x="792" y="268" class="label">Continuous batching</text>
  <text x="120" y="300" class="body">Shorter requests leave idle decode slots.</text>
  <text x="792" y="300" class="body">Finished decode slots get reused immediately.</text>

  <g transform="translate(120 352)">
    <text x="104" y="0" class="mono">t0</text>
    <text x="178" y="0" class="mono">t1</text>
    <text x="252" y="0" class="mono">t2</text>
    <text x="326" y="0" class="mono">t3</text>
    <text x="400" y="0" class="mono">t4</text>
    <text x="474" y="0" class="mono">t5</text>

    <text x="0" y="62" class="mono">slot 1</text>
    <text x="0" y="136" class="mono">slot 2</text>
    <text x="0" y="210" class="mono">slot 3</text>

    <rect x="92" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="123" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="166" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="197" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="240" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="271" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="314" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="345" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="388" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="419" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="462" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="493" y="60" class="mono" text-anchor="middle">A</text>

    <rect x="92" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="123" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="166" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="197" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="240" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="271" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="314" y="104" width="62" height="46" rx="12" fill="#F0E6D7"/><text x="345" y="134" class="body" text-anchor="middle">idle</text>
    <rect x="388" y="104" width="62" height="46" rx="12" fill="#F0E6D7"/><text x="419" y="134" class="body" text-anchor="middle">idle</text>
    <rect x="462" y="104" width="62" height="46" rx="12" fill="#F0E6D7"/><text x="493" y="134" class="body" text-anchor="middle">idle</text>

    <rect x="92" y="178" width="62" height="46" rx="12" fill="#DFA45D"/><text x="123" y="208" class="mono" text-anchor="middle">C</text>
    <rect x="166" y="178" width="62" height="46" rx="12" fill="#DFA45D"/><text x="197" y="208" class="mono" text-anchor="middle">C</text>
    <rect x="240" y="178" width="62" height="46" rx="12" fill="#DFA45D"/><text x="271" y="208" class="mono" text-anchor="middle">C</text>
    <rect x="314" y="178" width="62" height="46" rx="12" fill="#DFA45D"/><text x="345" y="208" class="mono" text-anchor="middle">C</text>
    <rect x="388" y="178" width="62" height="46" rx="12" fill="#DFA45D"/><text x="419" y="208" class="mono" text-anchor="middle">C</text>
    <rect x="462" y="178" width="62" height="46" rx="12" fill="#F0E6D7"/><text x="493" y="208" class="body" text-anchor="middle">idle</text>

    <text x="92" y="286" class="body">Effective batch shrinks: 3 → 2 → 1</text>
  </g>

  <g transform="translate(792 352)">
    <text x="104" y="0" class="mono">t0</text>
    <text x="178" y="0" class="mono">t1</text>
    <text x="252" y="0" class="mono">t2</text>
    <text x="326" y="0" class="mono">t3</text>
    <text x="400" y="0" class="mono">t4</text>
    <text x="474" y="0" class="mono">t5</text>

    <text x="0" y="62" class="mono">slot 1</text>
    <text x="0" y="136" class="mono">slot 2</text>
    <text x="0" y="210" class="mono">slot 3</text>

    <rect x="92" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="123" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="166" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="197" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="240" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="271" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="314" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="345" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="388" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="419" y="60" class="mono" text-anchor="middle">A</text>
    <rect x="462" y="30" width="62" height="46" rx="12" fill="#BFD3CE"/><text x="493" y="60" class="mono" text-anchor="middle">A</text>

    <rect x="92" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="123" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="166" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="197" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="240" y="104" width="62" height="46" rx="12" fill="#E8C792"/><text x="271" y="134" class="mono" text-anchor="middle">B</text>
    <rect x="314" y="104" width="62" height="46" rx="12" fill="#DFA45D"/><text x="345" y="134" class="mono" text-anchor="middle">D</text>
    <rect x="388" y="104" width="62" height="46" rx="12" fill="#DFA45D"/><text x="419" y="134" class="mono" text-anchor="middle">D</text>
    <rect x="462" y="104" width="62" height="46" rx="12" fill="#DFA45D"/><text x="493" y="134" class="mono" text-anchor="middle">D</text>

    <rect x="92" y="178" width="62" height="46" rx="12" fill="#5D7E77"/><text x="123" y="208" class="mono" text-anchor="middle" fill="#FCF7ED">C</text>
    <rect x="166" y="178" width="62" height="46" rx="12" fill="#5D7E77"/><text x="197" y="208" class="mono" text-anchor="middle" fill="#FCF7ED">C</text>
    <rect x="240" y="178" width="62" height="46" rx="12" fill="#8F9B6C"/><text x="271" y="208" class="mono" text-anchor="middle">E</text>
    <rect x="314" y="178" width="62" height="46" rx="12" fill="#8F9B6C"/><text x="345" y="208" class="mono" text-anchor="middle">E</text>
    <rect x="388" y="178" width="62" height="46" rx="12" fill="#8F9B6C"/><text x="419" y="208" class="mono" text-anchor="middle">E</text>
    <rect x="462" y="178" width="62" height="46" rx="12" fill="#8F9B6C"/><text x="493" y="208" class="mono" text-anchor="middle">E</text>

    <text x="92" y="286" class="body">Effective batch stays filled: 3 → 3 → 3</text>
  </g>

  <text x="120" y="742" class="body">Shorter requests leave idle decode slots.</text>
  <text x="792" y="742" class="body">Freed decode slots get reused immediately.</text>
</svg>
