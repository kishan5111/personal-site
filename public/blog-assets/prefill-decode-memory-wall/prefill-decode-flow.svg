<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#17120F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 35px 'Manrope', ui-sans-serif, system-ui; fill: #17120F; }
      .label { font: 600 21px 'Manrope', ui-sans-serif, system-ui; fill: #17120F; }
      .body { font: 500 17px 'Manrope', ui-sans-serif, system-ui; fill: #4B4037; }
      .small { font: 600 13px 'Manrope', ui-sans-serif, system-ui; fill: #6D6259; letter-spacing: .12em; text-transform: uppercase; }
      .token { font: 700 16px 'Manrope', ui-sans-serif, system-ui; fill: #17120F; }
    </style>
  </defs>

  <rect width="1440" height="860" rx="28" fill="#F7F1E3"/>
  <text x="86" y="96" class="small">LLM inference flow</text>
  <text x="86" y="142" class="title">Prefill and decode</text>
  <text x="86" y="182" class="title">are two different programs</text>

  <rect x="86" y="214" width="272" height="94" rx="24" fill="#FDF9F1" stroke="#D7C6AC" stroke-width="2"/>
  <text x="118" y="248" class="small">Prompt tokens</text>
  <rect x="116" y="264" width="42" height="28" rx="14" fill="#E8D9C5"/>
  <rect x="166" y="264" width="42" height="28" rx="14" fill="#E8D9C5"/>
  <rect x="216" y="264" width="42" height="28" rx="14" fill="#E8D9C5"/>
  <rect x="266" y="264" width="42" height="28" rx="14" fill="#E8D9C5"/>
  <text x="130" y="284" class="token">t₁</text>
  <text x="180" y="284" class="token">t₂</text>
  <text x="230" y="284" class="token">t₃</text>
  <text x="277" y="284" class="token">…</text>

  <line x1="358" y1="261" x2="470" y2="261" stroke="#17120F" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="492" y="190" width="402" height="142" rx="28" fill="#E8C792" stroke="#C78338" stroke-width="2.5"/>
  <text x="530" y="238" class="label">Prefill</text>
  <text x="530" y="278" class="body">Process the full prompt in parallel</text>
  <text x="530" y="307" class="body">Dense matmuls, high arithmetic intensity</text>

  <line x1="894" y1="261" x2="1006" y2="261" stroke="#17120F" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="1028" y="174" width="326" height="110" rx="24" fill="#FCF7ED" stroke="#D7C6AC" stroke-width="2"/>
  <text x="1062" y="216" class="small">Outputs of prefill</text>
  <text x="1062" y="245" class="body">first-token logits</text>
  <text x="1062" y="273" class="body">KV cache for all attention layers</text>

  <line x1="1187" y1="286" x2="1187" y2="360" stroke="#17120F" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="1008" y="390" width="346" height="138" rx="28" fill="#D8E6E3" stroke="#5D7E77" stroke-width="2.5"/>
  <text x="1042" y="430" class="label">Decode loop</text>
  <text x="1042" y="468" class="body">One token at a time</text>
  <text x="1042" y="495" class="body">Read weights + read KV cache</text>
  <text x="1042" y="517" class="body">emit one token</text>

  <path d="M1180 528C1180 576 1124 606 1087 594" stroke="#17120F" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="1202" y="582" class="small">repeat N times</text>

  <rect x="86" y="420" width="812" height="268" rx="28" fill="#FCF7ED" stroke="#D7C6AC" stroke-width="2"/>
  <text x="124" y="468" class="label">KV cache lives between the two phases</text>
  <text x="124" y="503" class="body">Prefill builds it once. Decode reuses it for every new token.</text>

  <g transform="translate(124 546)">
    <rect x="0" y="0" width="128" height="78" rx="16" fill="#EFE4D3"/>
    <rect x="148" y="0" width="128" height="78" rx="16" fill="#EFE4D3"/>
    <rect x="296" y="0" width="128" height="78" rx="16" fill="#EFE4D3"/>
    <rect x="444" y="0" width="128" height="78" rx="16" fill="#EFE4D3"/>
    <rect x="592" y="0" width="128" height="78" rx="16" fill="#EFE4D3"/>
    <text x="32" y="45" class="token">layer 1</text>
    <text x="180" y="45" class="token">layer 2</text>
    <text x="328" y="45" class="token">layer 3</text>
    <text x="478" y="45" class="token">…</text>
    <text x="624" y="45" class="token">layer L</text>
  </g>

  <text x="86" y="768" class="body">The core serving split: prefill rewards compute and parallelism;</text>
  <text x="86" y="794" class="body">decode pays repeated memory traffic for each generated token.</text>
</svg>
